<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharp Money — Polymarket Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.26.0/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05050d;--s1:#0b0b18;--s2:#10102a;--s3:#171730;
  --b1:rgba(140,100,255,.1);--b2:rgba(140,100,255,.2);--b3:rgba(140,100,255,.35);
  --t1:#f0eeff;--t2:#8878cc;--t3:#4a3d8a;--t4:#271f55;
  --violet:#9d7cff;--va:rgba(157,124,255,.12);--vb:rgba(157,124,255,.28);
  --green:#00e090;--ga:rgba(0,224,144,.1);--gb:rgba(0,224,144,.25);
  --amber:#ffb830;--red:#ff4d6a;--blue:#4d9fff;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',system-ui,sans-serif;
  --r:8px;--rl:14px;
}
html,body{background:var(--bg);color:var(--t1);font-family:var(--sans);min-height:100vh;-webkit-font-smoothing:antialiased;font-size:14px}
button,input,select{font-family:inherit;outline:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
.nav{position:sticky;top:0;z-index:99;display:flex;align-items:center;height:56px;padding:0 20px;background:rgba(5,5,13,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--b1);gap:12px}
.logo{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:.08em}
.logo-ring{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--violet),var(--blue));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#05050d}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.nav-status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t3);font-family:var(--mono)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:glow 2s ease infinite;flex-shrink:0}
.dot.scanning{background:var(--amber);box-shadow:none;animation:throb .6s ease infinite}
.refresh-btn{padding:5px 12px;border-radius:100px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-size:11px;font-family:var(--mono);font-weight:600;cursor:pointer;transition:all .2s}
.refresh-btn:hover{background:var(--s2);color:var(--t1)}
.settings-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--b1);background:transparent;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.settings-btn:hover{background:var(--s2);color:var(--t2)}
.page{max-width:1100px;margin:0 auto;padding:24px 16px 80px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.stat{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:16px}
.stat-lbl{font-size:10px;font-family:var(--mono);font-weight:700;letter-spacing:.08em;color:var(--t3);text-transform:uppercase;margin-bottom:8px}
.stat-val{font-size:22px;font-family:var(--mono);font-weight:900;color:var(--t1)}
.controls{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.ctrl-group{display:flex;align-items:center;gap:8px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:8px 14px}
.ctrl-label{font-size:10px;font-family:var(--mono);font-weight:700;letter-spacing:.06em;color:var(--t3);text-transform:uppercase;white-space:nowrap}
.ctrl-group input[type=range]{flex:1;min-width:100px;accent-color:var(--violet)}
.ctrl-val{font-size:12px;font-family:var(--mono);font-weight:700;color:var(--t1);min-width:60px;text-align:right}
.filter-group{display:flex;gap:5px}
.filter-btn{padding:5px 12px;border-radius:100px;border:1px solid var(--b1);background:transparent;color:var(--t3);font-size:11px;font-family:var(--mono);font-weight:600;cursor:pointer;transition:all .2s}
.filter-btn:hover{border-color:var(--b2);color:var(--t2)}
.filter-btn.on{background:var(--va);border-color:var(--b3);color:var(--violet);font-weight:700}
.last-upd{font-size:11px;font-family:var(--mono);color:var(--t4);margin-left:auto}
.feed-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.feed-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--violet);display:flex;align-items:center;gap:6px}
.feed-icon{width:20px;height:20px;border-radius:6px;background:var(--va);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--violet)}
.feed-count{font-size:10px;font-family:var(--mono);color:var(--t3);margin-left:auto}
.feed{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);overflow:hidden}
.feed-row{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--b1);transition:background .15s;animation:fadein .3s ease both}
.feed-row:last-child{border-bottom:none}
.feed-row:hover{background:var(--s2)}
.avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;background:var(--s2);flex-shrink:0;border:1px solid var(--b2)}
.avatar-fallback{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--va),rgba(77,159,255,.1));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--violet);flex-shrink:0}
.row-main{flex:1;min-width:0}
.trader-line{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap}
.trader-name{font-size:13px;font-weight:700;color:var(--t1)}
.rank-badge{font-size:9px;font-family:var(--mono);font-weight:700;padding:1px 6px;border-radius:4px;letter-spacing:.04em}
.rank-badge.overall{background:var(--va);border:1px solid var(--b2);color:var(--violet)}
.rank-badge.sports{background:var(--ga);border:1px solid var(--gb);color:var(--green)}
.market-title{font-size:12px;color:var(--t2);margin-bottom:2px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.outcome-line{font-size:11px;font-family:var(--mono);color:var(--t3)}
.outcome-yes{color:var(--green);font-weight:700}
.outcome-no{color:var(--red);font-weight:700}
.row-right{text-align:right;flex-shrink:0}
.buy-size{font-size:20px;font-weight:900;font-family:var(--mono);line-height:1}
.buy-time{font-size:10px;color:var(--t3);font-family:var(--mono);margin-top:2px}
.mkt-link{font-size:9px;color:var(--blue);text-decoration:none;font-family:var(--mono)}
.mkt-link:hover{text-decoration:underline}
.empty{padding:60px 20px;text-align:center;color:var(--t3);font-size:13px;line-height:1.8}
.size-1k{color:var(--t1)}
.size-5k{color:var(--amber)}
.size-10k{color:var(--green)}
.size-25k{color:var(--violet);text-shadow:0 0 20px var(--violet)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:999;display:none;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:20px;width:100%;max-width:440px;overflow:hidden;animation:fadein .2s ease}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 0}
.modal-hdr h2{font-size:16px;font-weight:800}
.modal-close{width:28px;height:28px;border-radius:50%;border:1px solid var(--b2);background:transparent;color:var(--t2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--s2)}
.modal-body{padding:16px 22px 22px;display:flex;flex-direction:column;gap:14px}
.field{display:flex;flex-direction:column;gap:5px}
.field-label{font-size:10px;font-family:var(--mono);font-weight:700;letter-spacing:.07em;color:var(--t3);text-transform:uppercase}
.field input,.field select{background:var(--s2);border:1px solid var(--b2);border-radius:var(--r);padding:9px 12px;color:var(--t1);font-size:13px;font-family:var(--mono);transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--violet)}
.field select option{background:var(--s2)}
.field-hint{font-size:11px;color:var(--t3);line-height:1.5}
.field-hint a{color:var(--violet)}
.modal-actions{display:flex;gap:8px}
.btn-primary{flex:1;padding:11px;border-radius:var(--r);border:none;background:linear-gradient(135deg,var(--violet),var(--blue));color:#fff;font-size:12px;font-weight:800;font-family:var(--mono);cursor:pointer;transition:opacity .2s}
.btn-primary:hover{opacity:.85}
.btn-secondary{padding:11px 16px;border-radius:var(--r);border:1px solid var(--b2);background:transparent;color:var(--t2);font-size:12px;font-family:var(--mono);cursor:pointer;transition:all .2s}
.btn-secondary:hover{background:var(--s2)}
.save-status{font-size:11px;font-family:var(--mono);text-align:center;min-height:16px}
.ntoggle{position:relative;width:36px;height:20px;cursor:pointer;flex-shrink:0}
.ntoggle input{opacity:0;width:0;height:0}
.ntoggle-slider{position:absolute;inset:0;background:var(--s3);border-radius:10px;transition:.2s}
.ntoggle-slider:before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:var(--t3);border-radius:50%;transition:.2s}
.ntoggle input:checked+.ntoggle-slider{background:var(--violet)}
.ntoggle input:checked+.ntoggle-slider:before{transform:translateX(16px);background:#fff}
.toggle-row{display:flex;align-items:center;justify-content:space-between}
@keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
@keyframes glow{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes throb{0%,100%{transform:scale(1)}50%{transform:scale(.4)}}
@media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)}.controls{flex-direction:column;align-items:stretch}}
</style>
</head>
<body>
<nav class="nav">
  <div class="logo"><div class="logo-ring">P</div>SHARP MONEY</div>
  <div class="nav-status"><div class="dot" id="dot"></div><span id="status-txt">Loading</span></div>
  <div class="nav-right">
    <span style="font-size:10px;font-family:var(--mono);color:var(--t4)" id="cd-txt"></span>
    <button class="refresh-btn" onclick="doRefresh()"><i class="ti ti-refresh" style="font-size:12px"></i> Refresh</button>
    <button class="settings-btn" onclick="openSettings()"><i class="ti ti-bell" style="font-size:14px"></i></button>
  </div>
</nav>
<div class="page">
  <div class="stats">
    <div class="stat"><div class="stat-lbl">Buys Shown</div><div class="stat-val" id="s-count">—</div></div>
    <div class="stat"><div class="stat-lbl">Volume</div><div class="stat-val" id="s-vol">—</div></div>
    <div class="stat"><div class="stat-lbl">Traders Tracked</div><div class="stat-val" id="s-traders">—</div></div>
    <div class="stat"><div class="stat-lbl">Largest Buy</div><div class="stat-val" id="s-top">—</div></div>
  </div>
  <div class="controls">
    <div class="ctrl-group">
      <span class="ctrl-label">Min Buy</span>
      <input type="range" id="thresh" min="0" max="25000" value="1000" step="500" oninput="onThresh(this.value)">
      <span class="ctrl-val" id="thresh-val">$1,000+</span>
    </div>
    <div class="filter-group">
      <button class="filter-btn on" id="f-all" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" id="f-overall" onclick="setFilter('OVERALL',this)">Overall PnL</button>
      <button class="filter-btn" id="f-sports" onclick="setFilter('SPORTS',this)">Sports PnL</button>
    </div>
    <span class="last-upd" id="last-upd"></span>
  </div>
  <div class="feed-hdr">
    <div class="feed-title"><div class="feed-icon"><i class="ti ti-coin" style="font-size:11px"></i></div>Smart Money Buys</div>
    <span class="feed-count" id="feed-count"></span>
  </div>
  <div class="feed" id="feed"><div class="empty">Loading smart money buys…</div></div>
</div>
<div class="overlay" id="overlay" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <div class="modal-hdr">
      <h2><i class="ti ti-bell" style="font-size:14px;margin-right:6px;color:var(--violet)"></i>Alert Settings</h2>
      <button class="modal-close" onclick="closeSettings()">×</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <span class="field-label">ntfy.sh Topic</span>
        <input id="cfg-topic" placeholder="e.g. sharpidx-derek-2026" type="text">
        <span class="field-hint">Download the free <a href="https://ntfy.sh" target="_blank">ntfy app</a> → subscribe to this topic to get phone alerts.</span>
      </div>
      <div class="field">
        <div class="toggle-row">
          <span class="field-label">Alert Threshold</span>
          <span id="cfg-thresh-val"
